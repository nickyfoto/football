<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gridiron Rush - NFL Arcade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Russo One', sans-serif;
            touch-action: none; /* Prevent pull-to-refresh on mobile */
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through to canvas */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .hud-panel {
            background: rgba(0, 0, 0, 0.75);
            border-bottom: 4px solid #fff;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            text-transform: uppercase;
        }
        .interactive-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto; /* Catch clicks for buttons */
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(3px);
            z-index: 10;
        }
        .hidden { display: none !important; }
        
        button {
            background: #e53e3e; /* Red-600 */
            color: white;
            border: 4px solid white;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: 'Russo One', sans-serif;
            cursor: pointer;
            border-radius: 8px;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            transition: transform 0.1s, background 0.2s;
            pointer-events: auto;
        }
        button:active {
            transform: scale(0.95);
        }
        button:hover {
            background: #c53030;
        }

        .message-text {
            font-size: 3rem;
            color: #fbbf24; /* Amber-400 */
            text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            margin-bottom: 20px;
            text-align: center;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        .team-blue { color: #60a5fa; }
        .team-red { color: #f87171; }
        .stat-box { text-align: center; }
        .stat-value { font-size: 1.5rem; color: #fbbf24;}
        .stat-label { font-size: 0.75rem; color: #aaa; letter-spacing: 1px;}
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <!-- Heads Up Display -->
    <div class="ui-layer" id="hud" style="display: none;">
        <div class="hud-panel">
            <div class="stat-box">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="scoreDisplay">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">DOWN & DISTANCE</div>
                <div class="stat-value" id="downDisplay">1ST & 10</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">BALL ON</div>
                <div class="stat-value" id="yardLineDisplay">OWN 20</div>
            </div>
        </div>
        <!-- Bottom instruction area -->
        <div id="mobile-instruction" class="text-white text-center p-4 opacity-50 text-sm tracking-wider">
            DRAG TO MOVE • ARROW KEYS TO RUN
        </div>
    </div>

    <!-- Start / Game Over Screen -->
    <div id="overlay-menu" class="interactive-overlay">
        <h1 class="text-5xl md:text-7xl text-white mb-2" style="text-shadow: 3px 3px 0 #000;">GRIDIRON<span class="text-red-500"> RUSH</span></h1>
        <p class="text-gray-300 mb-8 max-w-md text-center">Get First Downs, Score Touchdowns, Kick PATs, Dodge Defenders.</p>
        <div id="final-score-container" class="hidden mb-6 text-center">
            <p class="text-gray-300 text-xl">FINAL SCORE</p>
            <p id="final-score" class="text-5xl text-yellow-400">0</p>
        </div>
        <button id="start-btn">PLAY NOW</button>
    </div>

    <!-- In-Game State Messages (Touchdown, First Down, etc) -->
    <div id="overlay-message" class="interactive-overlay hidden" style="background: rgba(0,0,0,0.3); pointer-events: none;">
        <div class="message-text" id="big-message">TOUCHDOWN!</div>
    </div>

    <!-- Snap Ball Button -->
    <div id="overlay-snap" class="interactive-overlay hidden" style="background: rgba(0,0,0,0.1);">
        <button id="snap-btn" style="background: #2563eb; border-color: #fff;">SNAP BALL</button>
    </div>

    <!-- Kick PAT Button -->
    <div id="overlay-kick" class="interactive-overlay hidden" style="background: rgba(0,0,0,0.1);">
        <button id="kick-btn" style="background: #10b981; border-color: #fff;">KICK PAT</button>
    </div>

    <!-- Pass Button (Mobile/Touch) -->
    <button id="pass-btn" class="hidden" style="position: absolute; bottom: 20px; right: 20px; background: #8b5cf6; border-color: #fff; padding: 15px 25px; font-size: 1.2rem; z-index: 20; border-radius: 8px;">PASS</button>
</div>

<script>
    /**
     * GRIDIRON RUSH - HTML5 Canvas Game Engine
     */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const overlayMenu = document.getElementById('overlay-menu');
    const startBtn = document.getElementById('start-btn');
    const hud = document.getElementById('hud');
    const overlayMessage = document.getElementById('overlay-message');
    const bigMessage = document.getElementById('big-message');
    
    const overlaySnap = document.getElementById('overlay-snap');
    const snapBtn = document.getElementById('snap-btn');
    const overlayKick = document.getElementById('overlay-kick');
    const kickBtn = document.getElementById('kick-btn');
    const passBtn = document.getElementById('pass-btn');
    
    const finalScoreContainer = document.getElementById('final-score-container');
    const finalScoreEl = document.getElementById('final-score');

    // HUD Text Elements
    const scoreDisplay = document.getElementById('scoreDisplay');
    const downDisplay = document.getElementById('downDisplay');
    const yardLineDisplay = document.getElementById('yardLineDisplay');

    // --- GAME CONSTANTS & VARIABLES ---
    const FIELD_WIDTH_YARDS = 53.3; // Standard NFL width
    const FIELD_LENGTH_YARDS = 100;
    
    let ppy = 10; // Pixels Per Yard (calculated on resize)
    let cameraY = 0; // The yard line at the bottom of the screen

    // Game States: MENU, PRE_SNAP, PLAYING, ANIMATING, FIELD_GOAL_AIMING, FIELD_GOAL_KICKED
    let gameState = 'MENU'; 
    let difficultyLevel = 1;

    // Football Rules State
    let score = 0;
    let down = 1;
    let lineOfScrimmage = 20; // Starts at own 20
    let firstDownLine = 30;
    
    // Entities
    const player = {
        x: FIELD_WIDTH_YARDS / 2,
        y: 20,
        radius: 0.8, // Yards
        speed: 0.16, // Yards per frame (~9.6 yards/sec at 60fps)
        vx: 0,
        vy: 0,
        color: '#3b82f6' // Blue
    };

    let defenders = [];
    
    // Field Goal minigame variables
    let kickingMeter = { pos: 50, dir: 1, speed: 2 };
    let kickedBall = { active: false, x: 0, y: 0, vx: 0, vy: 0, size: 1 };

    // Passing Mechanics Variables
    let hasCrossedLOS = false;
    let wrs = []; // Array of Wide Receivers / Tight Ends
    let oLinemen = []; // Array of Offensive Linemen
    let cosmeticQB = null; // Stays behind after throw
    let passObj = { active: false, x: 0, y: 0, startDist: 0, size: 1, targetWrIndex: -1 };

    // Input State
    const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, a: false, s: false, d: false };
    const pointer = { active: false, x: 0, y: 0 }; // For touch/mouse drag

    // --- SOUND ENGINE (Web Audio API) ---
    const sfx = {
        ctx: null,
        init() {
            if (!this.ctx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();
            }
            if (this.ctx.state === 'suspended') this.ctx.resume();
        },
        playOsc(freq, type, duration, vol = 0.1, slideFreq = null) {
            if (!this.ctx) return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            if (slideFreq) {
                osc.frequency.exponentialRampToValueAtTime(slideFreq, this.ctx.currentTime + duration);
            }
            gain.gain.setValueAtTime(vol, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + duration);
        },
        playNoise(duration, vol=0.1) {
            if (!this.ctx) return;
            const bufferSize = this.ctx.sampleRate * duration;
            const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = this.ctx.createBufferSource();
            noise.buffer = buffer;
            const gain = this.ctx.createGain();
            gain.gain.setValueAtTime(vol, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
            const filter = this.ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 1000;
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(this.ctx.destination);
            noise.start();
        },
        whistle() {
            this.playOsc(2000, 'sine', 0.4, 0.1);
            setTimeout(() => this.playOsc(2200, 'sine', 0.5, 0.1), 100);
        },
        tackle() {
            this.playOsc(150, 'sine', 0.3, 0.3, 50); // Thud
            this.playNoise(0.2, 0.4); // Crunch
        },
        kick() {
            this.playOsc(200, 'sine', 0.15, 0.4, 40);
        },
        success() { 
            this.playOsc(440, 'square', 0.1, 0.05);
            setTimeout(() => this.playOsc(554, 'square', 0.2, 0.05), 100);
            setTimeout(() => this.playOsc(659, 'square', 0.4, 0.05), 200);
        },
        fail() { 
            this.playOsc(300, 'sawtooth', 0.5, 0.1, 150);
        },
        touchdown() {
            const notes = [440, 554, 659, 880];
            notes.forEach((freq, i) => {
                setTimeout(() => this.playOsc(freq, 'square', 0.5, 0.05), i * 150);
            });
            setTimeout(() => {
                if(!this.ctx) return;
                const noise = this.ctx.createBufferSource();
                const buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * 2, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for(let i=0; i<buffer.length; i++) data[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 1000;
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.2, this.ctx.currentTime + 0.5);
                gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2);
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                noise.start();
            }, 100);
        }
    };

    // --- INITIALIZATION & RESIZING ---
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        // Calculate PPY so the field width fits the screen, with a min/max clamp
        ppy = canvas.width / FIELD_WIDTH_YARDS;
        
        // If on a super wide screen (desktop), limit the field width so it doesn't look squished vertically
        if (ppy > canvas.height / 30) {
             ppy = canvas.height / 30; // Show at least 30 yards vertically
        }
    }
    window.addEventListener('resize', resize);
    resize(); // Initial sizing

    // --- INPUT HANDLING ---
    window.addEventListener('keydown', (e) => {
        if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
        if (e.key === ' ' && gameState === 'PRE_SNAP') snapBall();
        if (e.key === ' ' && gameState === 'FIELD_GOAL_AIMING') executeKick();
        if (e.key === ' ' && gameState === 'PLAYING') throwPass();
    });
    window.addEventListener('keyup', (e) => {
        if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
    });

    // Touch / Mouse interactions for moving
    function handlePointerDown(e) {
        if (gameState !== 'PLAYING') return;
        pointer.active = true;
        updatePointerPos(e);
    }
    function handlePointerMove(e) {
        if (!pointer.active || gameState !== 'PLAYING') return;
        updatePointerPos(e);
    }
    function handlePointerUp() {
        pointer.active = false;
    }
    function updatePointerPos(e) {
        // Support both touch and mouse
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        pointer.x = clientX;
        pointer.y = clientY;
    }

    canvas.addEventListener('mousedown', handlePointerDown);
    canvas.addEventListener('mousemove', handlePointerMove);
    window.addEventListener('mouseup', handlePointerUp);
    
    canvas.addEventListener('touchstart', handlePointerDown, {passive: false});
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handlePointerMove(e); }, {passive: false});
    window.addEventListener('touchend', handlePointerUp);

    // Buttons
    startBtn.addEventListener('click', startGame);
    snapBtn.addEventListener('click', snapBall);
    kickBtn.addEventListener('click', executeKick);
    passBtn.addEventListener('click', throwPass);

    // --- CORE GAME LOGIC ---

    function startGame() {
        sfx.init();
        sfx.whistle();
        score = 0;
        difficultyLevel = 1;
        resetDrive(20);
        updateHUD();
        gameState = 'PRE_SNAP';
        
        overlayMenu.classList.add('hidden');
        hud.style.display = 'block';
        setupPreSnap();
    }

    function resetDrive(startYard) {
        lineOfScrimmage = startYard;
        down = 1;
        firstDownLine = lineOfScrimmage + 10;
        setupPreSnap();
    }

    function setupPreSnap() {
        // Position player in shotgun formation, 4 yards behind the line of scrimmage
        player.x = FIELD_WIDTH_YARDS / 2;
        player.y = Math.max(1, lineOfScrimmage - 4); 
        player.vx = 0;
        player.vy = 0;
        pointer.active = false;
        kickedBall.active = false;

        // Reset passing state
        hasCrossedLOS = false;
        
        // Spawn Receivers (Left WR, Right TE, Right WR)
        wrs = [
            { active: true, x: FIELD_WIDTH_YARDS * 0.15, y: lineOfScrimmage, speed: player.speed * 1.05, color: '#93c5fd', type: 'WR', isBlocking: false }, 
            // Tight End! Starts right next to the O-Line, blocks for 60 frames (~1 sec), then runs deep.
            { active: true, x: (FIELD_WIDTH_YARDS / 2) + 4.5, y: lineOfScrimmage, speed: player.speed * 1.0, color: '#60a5fa', type: 'TE', isBlocking: true, blockTimer: 60 }, 
            { active: true, x: FIELD_WIDTH_YARDS * 0.85, y: lineOfScrimmage, speed: player.speed * 1.08, color: '#93c5fd', type: 'WR', isBlocking: false }  
        ];

        // Spawn 3 Offensive Linemen
        oLinemen = [
            { x: (FIELD_WIDTH_YARDS / 2) - 2.5, y: lineOfScrimmage + 0.5, radius: 0.9, color: '#1e3a8a' }, // Dark Blue
            { x: (FIELD_WIDTH_YARDS / 2), y: lineOfScrimmage + 0.5, radius: 0.9, color: '#1e3a8a' },
            { x: (FIELD_WIDTH_YARDS / 2) + 2.5, y: lineOfScrimmage + 0.5, radius: 0.9, color: '#1e3a8a' }
        ];

        cosmeticQB = null;
        passObj.active = false;
        passObj.targetWrIndex = -1;
        passBtn.classList.add('hidden');

        // Clear defenders
        defenders = [];
        
        // Show Snap Button
        overlaySnap.classList.remove('hidden');
        gameState = 'PRE_SNAP';
        updateHUD();
        centerCamera();
    }

    function snapBall() {
        sfx.init();
        sfx.whistle();
        overlaySnap.classList.add('hidden');
        passBtn.classList.remove('hidden');
        gameState = 'PLAYING';
        spawnDefenders();
    }

    function throwPass() {
        let activeWrs = wrs.filter(w => w.active && !w.isBlocking);
        if (gameState !== 'PLAYING' || hasCrossedLOS || activeWrs.length === 0) return;
        
        gameState = 'PASS_IN_AIR';
        passBtn.classList.add('hidden');
        sfx.playNoise(0.2, 0.1); // Throw sound
        
        // --- Find the best open receiver (balance openness with throw distance) ---
        let mostOpenWrIndex = 0;
        let bestScore = -9999;

        for (let i = 0; i < wrs.length; i++) {
            let wr = wrs[i];
            if (!wr.active || wr.isBlocking) continue; // Skip blocking Tight Ends!
            
            let minDefDist = 999;
            for (let def of defenders) {
                if (def.isCB || def.isSafety) {
                    let dist = Math.hypot(def.x - wr.x, def.y - wr.y);
                    if (dist < minDefDist) minDefDist = dist;
                }
            }
            
            let throwDist = Math.hypot(wr.x - player.x, wr.y - player.y);
            // 1 yard of separation is worth about 3 yards of shorter throw distance
            let score = (minDefDist * 3) - throwDist;
            
            // Record the receiver with the best score
            if (score > bestScore) {
                bestScore = score;
                mostOpenWrIndex = i;
            }
        }

        passObj.targetWrIndex = mostOpenWrIndex;
        let targetWR = wrs[mostOpenWrIndex];
        
        // Change color to Yellow to highlight the targeted receiver!
        targetWR.color = '#fef08a'; 
        
        passObj.active = true;
        passObj.x = player.x;
        passObj.y = player.y;
        passObj.startDist = Math.hypot(targetWR.x - player.x, targetWR.y - player.y);
        pointer.active = false; // Prevent movement input carrying over instantly
    }

    function spawnDefenders() {
        defenders = [];
        
        let baseDefSpeed = player.speed * (0.75 + (difficultyLevel * 0.02)); 
        if (baseDefSpeed > player.speed * 0.95) baseDefSpeed = player.speed * 0.95; 

        // Spawn Defensive Line (3 players opposite the O-Line)
        const dlOffsets = [-2.5, 0, 2.5];
        for (let offset of dlOffsets) {
            defenders.push({
                x: (FIELD_WIDTH_YARDS / 2) + offset,
                y: lineOfScrimmage + 1.5,
                radius: 0.9,
                speed: baseDefSpeed * 0.85, // DL are slightly slower
                color: '#7f1d1d', // Dark Red
                targetWrIndex: -1,
                isDL: true,
                engaged: false
            });
        }

        // Base: 2 Linebackers. +1 for every 3 difficulty levels. Max 5.
        let numLinebackers = Math.min(5, 2 + Math.floor(difficultyLevel / 3));

        // Spawn Front Line / Linebackers
        for (let i = 0; i < numLinebackers; i++) {
            let defX = (FIELD_WIDTH_YARDS / (numLinebackers + 1)) * (i + 1);
            let defY = lineOfScrimmage + 4 + (Math.random() * 5); // Pushed back slightly to make room for DL
            
            defenders.push({
                x: defX,
                y: defY,
                radius: 0.85,
                speed: baseDefSpeed * (0.9 + Math.random() * 0.2),
                color: '#ef4444', // Red
                targetWrIndex: -1
            });
        }

        // Spawn Cornerbacks to cover each Receiver/TE
        let blownCoverageIndex = Math.floor(Math.random() * wrs.length);
        wrs.forEach((w, index) => {
            // Make one receiver intentionally get WIDE OPEN on almost every play
            let coverageMultiplier = (index === blownCoverageIndex) 
                ? 0.75 + (Math.random() * 0.10) // 0.75 - 0.85x speed (Receiver burns them)
                : 0.94 + (Math.random() * 0.08); // 0.94 - 1.02x speed (Tight coverage)

            defenders.push({ 
                x: w.x, 
                y: lineOfScrimmage + 3, 
                radius: 0.8, 
                speed: w.speed * coverageMultiplier, 
                color: '#ef4444', 
                targetWrIndex: index,
                isCB: true 
            });
        });

        // Spawn 2 Deep Safeties
        let safetyDepth = Math.min(105, lineOfScrimmage + 15 + (Math.random() * 4)); 
        let safetySpeed = player.speed * (0.90 + (difficultyLevel * 0.015)); 
        if (safetySpeed > player.speed * 1.04) safetySpeed = player.speed * 1.04; 

        defenders.push({ x: FIELD_WIDTH_YARDS * 0.25, y: safetyDepth, radius: 0.8, speed: safetySpeed, color: '#b91c1c', isSafety: true });
        defenders.push({ x: FIELD_WIDTH_YARDS * 0.75, y: safetyDepth, radius: 0.8, speed: safetySpeed, color: '#b91c1c', isSafety: true });
    }

    // --- FIELD GOAL LOGIC ---
    function setupFieldGoal() {
        gameState = 'FIELD_GOAL_AIMING';
        
        // Snap from the 15 yard line (85 in field coords)
        player.x = FIELD_WIDTH_YARDS / 2;
        player.y = 85; 
        player.vx = 0;
        player.vy = 0;
        
        defenders = [];
        kickedBall.active = false;
        
        kickingMeter.pos = Math.random() * 100;
        kickingMeter.dir = Math.random() > 0.5 ? 1 : -1;
        kickingMeter.speed = Math.min(5, 1.5 + (difficultyLevel * 0.3)); // Meter gets faster
        
        downDisplay.innerText = 'EXTRA POINT';
        yardLineDisplay.innerText = 'OPP 15';
        
        overlayKick.classList.remove('hidden');
        passBtn.classList.add('hidden');
    }

    function executeKick() {
        sfx.kick();
        overlayKick.classList.add('hidden');
        gameState = 'FIELD_GOAL_KICKED';
        
        kickedBall.active = true;
        kickedBall.x = player.x;
        kickedBall.y = player.y;
        kickedBall.size = 1;
        
        // Calculate physics trajectory based on meter (50 is dead center)
        kickedBall.vy = 0.5; // Forward velocity
        let deviation = (kickingMeter.pos - 50) / 50; // Map 0-100 to -1.0 to 1.0
        kickedBall.vx = deviation * 0.3; // Sideways drift
    }

    function handleKickResult(isGood) {
        gameState = 'ANIMATING';
        if (isGood) {
            sfx.success();
            score += 1; // +1 point for PAT
            updateHUD();
            showBigMessage("IT'S GOOD!", '#34d399', () => { resetDrive(20); });
        } else {
            sfx.fail();
            showBigMessage("NO GOOD!", '#ef4444', () => { resetDrive(20); });
        }
    }


    function update() {
        // Handle aiming meter for PAT
        if (gameState === 'FIELD_GOAL_AIMING') {
            kickingMeter.pos += kickingMeter.speed * kickingMeter.dir;
            if (kickingMeter.pos >= 100) { kickingMeter.pos = 100; kickingMeter.dir = -1; }
            if (kickingMeter.pos <= 0) { kickingMeter.pos = 0; kickingMeter.dir = 1; }
            centerCamera();
            return;
        }

        // Handle ball physics for PAT
        if (gameState === 'FIELD_GOAL_KICKED') {
            kickedBall.x += kickedBall.vx;
            kickedBall.y += kickedBall.vy;
            kickedBall.size -= 0.003; // Shrink to look like it's gaining altitude
            if (kickedBall.size < 0.4) kickedBall.size = 0.4;
            
            // Goalposts are at Y=110 (back of endzone)
            if (kickedBall.y >= 110) {
                if (kickedBall.x > 23.57 && kickedBall.x < 29.73) {
                    handleKickResult(true);
                } else {
                    handleKickResult(false);
                }
            }
            centerCamera();
            return;
        }

        // Handle Receivers (Running and Blocking)
        if (gameState === 'PLAYING' || gameState === 'PASS_IN_AIR') {
            for (let w of wrs) {
                if (!w.active) continue;

                // Tight End Blocking Logic
                if (w.type === 'TE' && w.blockTimer > 0) {
                    w.blockTimer--;
                    w.isBlocking = true;

                    // TE looks for a nearby rushing defender to block
                    let nearestDef = null;
                    let minDist = 999;
                    for (let def of defenders) {
                        if (def.isDL || (!def.isCB && !def.isSafety)) { // Pass rushers
                            let d = Math.hypot(def.x - w.x, def.y - w.y);
                            if (d < minDist) { minDist = d; nearestDef = def; }
                        }
                    }
                    if (nearestDef) {
                        if (minDist > 1.2 && minDist < 3.0) {
                            w.x += (nearestDef.x - w.x) * 0.1;
                            w.y += (nearestDef.y - w.y) * 0.1;
                        } else if (minDist <= 1.2) {
                            nearestDef.engaged = true; // Engage block
                        }
                    }
                } else {
                    w.isBlocking = false;
                    w.y += w.speed; // Release into route!
                }
            }
        }

        // --- PASS IN AIR LOGIC ---
        if (gameState === 'PASS_IN_AIR') {
            let targetWR = wrs[passObj.targetWrIndex];
            const dx = targetWR.x - passObj.x;
            const dy = targetWR.y - passObj.y;
            const dist = Math.hypot(dx, dy);
            const passSpeed = player.speed * 4;

            // Defenders "Break on the Ball" - They all swarm the targeted receiver
            for (let def of defenders) {
                let dxDef = targetWR.x - def.x;
                let dyDef = targetWR.y - def.y;
                let distDef = Math.hypot(dxDef, dyDef);
                if (distDef > 0) {
                    let speedBoost = 1.0; 
                    def.x += (dxDef / distDef) * (def.speed * speedBoost);
                    def.y += (dyDef / distDef) * (def.speed * speedBoost);
                }
            }

            if (dist < passSpeed) {
                // Ball reached receiver location! Check if a DB is right there to break it up.
                let brokenUp = false;
                for (let def of defenders) {
                    if (def.isCB || def.isSafety) {
                        // Vastly reduced deflection radius (must be right on top of them)
                        if (Math.hypot(def.x - targetWR.x, def.y - targetWR.y) < def.radius + 0.1) {
                            brokenUp = true;
                            break;
                        }
                    }
                }

                if (brokenUp) {
                    gameState = 'ANIMATING';
                    sfx.fail();
                    showBigMessage("PASS BROKEN UP!", "#fbbf24", () => {
                        down++;
                        if (down > 4) handleGameOver('TURNOVER ON DOWNS', '#ef4444');
                        else setupPreSnap();
                    });
                    return;
                }

                // Catch!
                sfx.kick(); // Thud sound
                cosmeticQB = { x: player.x, y: player.y };
                player.x = targetWR.x;
                player.y = targetWR.y;
                player.vx = 0;
                player.vy = targetWR.speed;
                for (let w of wrs) w.active = false;
                passObj.active = false;
                gameState = 'PLAYING';
                
                // All defenders switch to targeting the new ball carrier
                for (let def of defenders) {
                    def.targetWrIndex = -1;
                    def.isCB = false; // They now act like normal tacklers
                }
            } else {
                passObj.x += (dx / dist) * passSpeed;
                passObj.y += (dy / dist) * passSpeed;
                
                const progress = 1 - (dist / passObj.startDist);
                passObj.size = 1 + Math.sin(progress * Math.PI) * 1.5;

                // Interception Check (Only intercept if ball is low)
                if (passObj.size < 1.2 && dist > 2.0) {
                    for (let def of defenders) {
                        // Tighten hitbox so it has to hit them squarely
                        if (Math.hypot(def.x - passObj.x, def.y - passObj.y) < def.radius) {
                            if (def.isCB || def.isSafety) {
                                gameState = 'ANIMATING';
                                sfx.fail();
                                showBigMessage("PASS DEFLECTED!", "#fbbf24", () => {
                                    down++;
                                    if (down > 4) handleGameOver('TURNOVER ON DOWNS', '#ef4444');
                                    else setupPreSnap();
                                });
                                return;
                            } else {
                                handleGameOver('INTERCEPTED!', '#ef4444');
                                return;
                            }
                        }
                    }
                }
                
                // Incomplete pass (goes out of bounds)
                if (passObj.y > 110) {
                    gameState = 'ANIMATING';
                    sfx.fail();
                    showBigMessage("INCOMPLETE", "#fbbf24", () => {
                        down++;
                        if (down > 4) handleGameOver('TURNOVER ON DOWNS', '#ef4444');
                        else setupPreSnap();
                    });
                    return;
                }
            }
            centerCamera(passObj.y);
            return; // Skip normal player update while ball in air
        }

        if (gameState !== 'PLAYING') return;

        // --- Player Movement ---
        let moveX = 0;
        let moveY = 0;

        if (keys.ArrowUp || keys.w) moveY = 1;
        if (keys.ArrowDown || keys.s) moveY = -1;
        if (keys.ArrowLeft || keys.a) moveX = -1;
        if (keys.ArrowRight || keys.d) moveX = 1;

        if (pointer.active) {
            const screenPlayerX = (player.x - (FIELD_WIDTH_YARDS/2)) * ppy + (canvas.width/2);
            const screenPlayerY = getScreenY(player.y);
            const dx = pointer.x - screenPlayerX;
            const dy = pointer.y - screenPlayerY;
            const distance = Math.hypot(dx, dy);
            
            if (distance > 10) { // Deadzone
                moveX = dx / distance;
                moveY = -dy / distance;
            }
        }

        if (moveX !== 0 && moveY !== 0 && !pointer.active) {
            const length = Math.hypot(moveX, moveY);
            moveX /= length;
            moveY /= length;
        }

        player.vx = moveX * player.speed;
        player.vy = moveY * player.speed;

        player.x += player.vx;
        player.y += player.vy;

        player.x = Math.max(player.radius, Math.min(FIELD_WIDTH_YARDS - player.radius, player.x));
        player.y = Math.max(0, player.y);

        // Check if crossed Line of Scrimmage
        if (player.y > lineOfScrimmage + 0.5 && !hasCrossedLOS) {
            hasCrossedLOS = true;
            passBtn.classList.add('hidden');
        }

        // --- Offensive Line Blocking Logic ---
        for (let ol of oLinemen) {
            let nearestDL = null;
            let minDist = 999;
            for (let def of defenders) {
                if (def.isDL) {
                    let d = Math.hypot(def.x - ol.x, def.y - ol.y);
                    if (d < minDist) { minDist = d; nearestDL = def; }
                }
            }
            if (nearestDL) {
                if (minDist > 1.2) {
                    // Move to block
                    ol.x += (nearestDL.x - ol.x) * 0.1;
                    ol.y += (nearestDL.y - ol.y) * 0.1;
                } else {
                    // Engage block!
                    nearestDL.engaged = true;
                }
            }
        }

        // --- Defender AI ---
        for (let def of defenders) {
            // Shed block chance for engaged defenders
            let currentSpeed = def.speed;
            if (def.engaged) {
                currentSpeed *= 0.15; // Slowed heavily by blocker
                if (Math.random() < 0.04) def.engaged = false; // 4% chance to shed block per frame
            }

            // Cornerback coverage logic (covering their assigned Receiver/TE)
            if (def.isCB && def.targetWrIndex !== -1 && wrs[def.targetWrIndex] && wrs[def.targetWrIndex].active) {
                let assignedWR = wrs[def.targetWrIndex];
                
                if (assignedWR.isBlocking) {
                    // Hover in zone, wait for TE to release
                    def.x += (assignedWR.x - def.x) * 0.1;
                    def.y += (assignedWR.y + 4 - def.y) * 0.1; // Stay 4 yards back
                } else {
                    def.x += (assignedWR.x - def.x) * 0.15; // Track laterally quickly
                    def.y += def.speed; // Run downfield vertically
                    
                    // Add a little realistic "jitter" if they are right on top of the WR
                    if (Math.hypot(assignedWR.x - def.x, assignedWR.y - def.y) < 1.0) {
                        def.x += (Math.random() - 0.5) * 0.2;
                    }
                }
                continue; // Skip normal pursuit/tackle logic while running the route
            }

            let targetX = player.x;
            let targetY = player.y;
            let targetVx = player.vx;
            let targetVy = player.vy;

            // Safeties "read" the play and take pursuit angles
            if (def.isSafety) {
                const distToTarget = Math.hypot(targetX - def.x, targetY - def.y);
                const lookAhead = Math.min(25, distToTarget * 2); // Predict frames ahead based on distance
                targetX += targetVx * lookAhead;
                targetY += targetVy * lookAhead;
            }

            const dx = targetX - def.x;
            const dy = targetY - def.y;
            const dist = Math.hypot(dx, dy);

            if (dist > 0) {
                def.x += (dx / dist) * currentSpeed;
                def.y += (dy / dist) * currentSpeed;
            }

            // Tackle (using actual distance to target, not predicted)
            const actualDist = Math.hypot(player.x - def.x, player.y - def.y);

            if (actualDist < (player.radius + def.radius) * 0.9) {
                handleTackle();
                return; 
            }
        }

        // --- Touchdown Check ---
        if (player.y >= 100) {
            handleTouchdown();
            return;
        }

        // --- Camera Follow ---
        centerCamera();
    }

    function centerCamera(focusY = null) {
        // Special camera angle for field goal
        if (gameState === 'FIELD_GOAL_AIMING' || gameState === 'FIELD_GOAL_KICKED') {
            // Anchor camera slightly lower so goalposts at 110 are clearly visible
            let targetCameraY = Math.min(80, 115 - (canvas.height / ppy));
            cameraY += (targetCameraY - cameraY) * 0.1;
            return;
        }

        // Standard running follow logic
        const desiredScreenY = canvas.height * 0.75;
        let targetY = focusY !== null ? focusY : player.y;
        let targetCameraY = targetY - ((canvas.height - desiredScreenY) / ppy);
        
        if (gameState === 'PRE_SNAP') cameraY = targetCameraY; 
        else cameraY += (targetCameraY - cameraY) * 0.1; // Smooth lerp

        const visibleYards = canvas.height / ppy;
        if (cameraY < -5) cameraY = -5;
        if (cameraY + visibleYards > 105) cameraY = 105 - visibleYards;
    }

    function handleTackle() {
        gameState = 'ANIMATING';
        pointer.active = false;
        sfx.tackle();
        
        let forwardProgress = Math.max(lineOfScrimmage, player.y);
        if (player.y < lineOfScrimmage) forwardProgress = Math.max(1, player.y);

        const yardsGained = forwardProgress - lineOfScrimmage;
        lineOfScrimmage = forwardProgress;

        let message = 'TACKLED!';
        let messageColor = '#fbbf24'; 

        if (lineOfScrimmage >= firstDownLine) {
            setTimeout(() => sfx.success(), 400); // slight delay after tackle sound
            message = 'FIRST DOWN!';
            messageColor = '#34d399'; 
            down = 1;
            firstDownLine = lineOfScrimmage + 10;
        } else {
            down++;
            if (down > 4) {
                setTimeout(() => sfx.fail(), 400);
                message = 'TURNOVER ON DOWNS';
                messageColor = '#ef4444'; 
                handleGameOver(message, messageColor);
                return;
            }
        }

        showBigMessage(message, messageColor, () => {
            setupPreSnap();
        });
    }

    function handleTouchdown() {
        gameState = 'ANIMATING';
        pointer.active = false;
        sfx.touchdown();
        score += 6; // TD is 6 points, PAT kicks for 1
        difficultyLevel++;
        updateHUD();

        showBigMessage('TOUCHDOWN!', '#60a5fa', () => {
            setupFieldGoal();
        });
    }

    function handleGameOver(msg, color) {
        sfx.whistle();
        showBigMessage(msg, color, () => {
            gameState = 'MENU';
            hud.style.display = 'none';
            overlayMenu.classList.remove('hidden');
            finalScoreContainer.classList.remove('hidden');
            finalScoreEl.innerText = score;
            startBtn.innerText = 'PLAY AGAIN';
        }, 2000);
    }

    function showBigMessage(text, color, callback, delay = 1500) {
        bigMessage.innerText = text;
        bigMessage.style.color = color;
        overlayMessage.classList.remove('hidden');
        
        setTimeout(() => {
            overlayMessage.classList.add('hidden');
            if (callback) callback();
        }, delay);
    }

    function updateHUD() {
        scoreDisplay.innerText = score;
        
        if (gameState === 'FIELD_GOAL_AIMING' || gameState === 'FIELD_GOAL_KICKED') return;

        let downSuffix = 'TH';
        if (down === 1) downSuffix = 'ST';
        else if (down === 2) downSuffix = 'ND';
        else if (down === 3) downSuffix = 'RD';
        
        let distance = Math.ceil(firstDownLine - lineOfScrimmage);
        let distText = distance;
        if (firstDownLine >= 100) distText = 'GOAL';
        else if (distance <= 0) distText = 'INCHES'; 

        downDisplay.innerText = `${down}${downSuffix} & ${distText}`;

        let yardText = '';
        let currentYardInt = Math.floor(lineOfScrimmage);
        if (currentYardInt === 50) yardText = '50';
        else if (currentYardInt < 50) yardText = `OWN ${currentYardInt}`;
        else yardText = `OPP ${100 - currentYardInt}`;
        
        yardLineDisplay.innerText = yardText;
    }

    // --- DRAWING FUNCTIONS ---

    function getScreenY(yardLine) {
        return canvas.height - ((yardLine - cameraY) * ppy);
    }
    
    function getScreenX(fieldX) {
        const fieldPixelWidth = FIELD_WIDTH_YARDS * ppy;
        const offsetLeft = (canvas.width - fieldPixelWidth) / 2;
        return offsetLeft + (fieldX * ppy);
    }

    function drawField() {
        // Grass Base
        ctx.fillStyle = '#166534'; // Green-800
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const startYard = Math.floor(cameraY);
        const endYard = Math.ceil(cameraY + (canvas.height / ppy));

        const leftSideline = getScreenX(0);
        const rightSideline = getScreenX(FIELD_WIDTH_YARDS);
        
        // Fill out-of-bounds with darker green
        ctx.fillStyle = '#064e3b'; // Green-900
        ctx.fillRect(0, 0, leftSideline, canvas.height);
        ctx.fillRect(rightSideline, 0, canvas.width - rightSideline, canvas.height);

        // White line styles
        ctx.strokeStyle = '#ffffff';
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        for (let y = startYard; y <= endYard; y++) {
            if (y < 0 || y > 100) continue; 
            
            const screenY = getScreenY(y);
            
            if (y % 5 === 0) {
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(leftSideline, screenY);
                ctx.lineTo(rightSideline, screenY);
                ctx.stroke();

                if (y % 10 === 0 && y > 0 && y < 100) {
                    let displayNum = y > 50 ? 100 - y : y;
                    ctx.font = `bold ${ppy * 1.5}px 'Russo One', sans-serif`;
                    
                    ctx.save();
                    ctx.translate(leftSideline + (ppy * 4), screenY);
                    ctx.rotate(-Math.PI/2);
                    ctx.fillText(displayNum, 0, 0);
                    ctx.restore();

                    ctx.save();
                    ctx.translate(rightSideline - (ppy * 4), screenY);
                    ctx.rotate(Math.PI/2);
                    ctx.fillText(displayNum, 0, 0);
                    ctx.restore();
                }
            } else {
                ctx.lineWidth = 1;
                const hashWidth = ppy * 0.5;
                const leftHash = getScreenX(FIELD_WIDTH_YARDS / 2 - 3); 
                const rightHash = getScreenX(FIELD_WIDTH_YARDS / 2 + 3);
                
                ctx.beginPath();
                ctx.moveTo(leftHash - hashWidth, screenY);
                ctx.lineTo(leftHash + hashWidth, screenY);
                ctx.moveTo(rightHash - hashWidth, screenY);
                ctx.lineTo(rightHash + hashWidth, screenY);
                ctx.stroke();
            }
        }

        // Home Endzone
        if (cameraY <= 0) {
            const ezTop = getScreenY(0);
            ctx.fillStyle = '#1e3a8a'; 
            ctx.fillRect(leftSideline, ezTop, rightSideline - leftSideline, canvas.height - ezTop);
            
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.font = `bold ${ppy * 4}px 'Russo One', sans-serif`;
            ctx.fillText("HOME", canvas.width/2, ezTop + (ppy*5));
        }
        
        // Away Endzone
        if (cameraY + (canvas.height/ppy) >= 100) {
            const ezBottom = getScreenY(100);
            const ezTop = getScreenY(110); // Back of endzone
            
            ctx.fillStyle = '#7f1d1d'; 
            // Only draw heights > 0 to avoid inversed rect bugs
            ctx.fillRect(leftSideline, Math.max(0, ezTop), rightSideline - leftSideline, ezBottom - Math.max(0, ezTop));
            
            // Draw green turf behind the endzone backline
            if (ezTop > 0) {
                ctx.fillStyle = '#166534';
                ctx.fillRect(leftSideline, 0, rightSideline - leftSideline, ezTop);
            }

            if (ezBottom > 0) {
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.font = `bold ${ppy * 4}px 'Russo One', sans-serif`;
                ctx.fillText("AWAY", canvas.width/2, ezBottom - (ppy*5));
            }
        }

        // Draw Line of Scrimmage and First Down Line
        if (gameState === 'PLAYING' || gameState === 'PRE_SNAP' || gameState === 'ANIMATING') {
            const losY = getScreenY(lineOfScrimmage);
            if (losY > 0 && losY < canvas.height) {
                ctx.strokeStyle = '#3b82f6'; 
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(leftSideline, losY);
                ctx.lineTo(rightSideline, losY);
                ctx.stroke();
            }

            const fdY = getScreenY(firstDownLine);
            if (fdY > 0 && fdY < canvas.height && firstDownLine <= 100) {
                ctx.strokeStyle = '#facc15'; 
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(leftSideline, fdY);
                ctx.lineTo(rightSideline, fdY);
                ctx.stroke();
            }
        }

        // Draw Goalposts (at back of endzone, Y=110)
        if (cameraY > 50) {
            const postY = getScreenY(110);
            if (postY > -100 && postY < canvas.height + 100) {
                const leftX = getScreenX(23.57); // Standard NFL Width mapping
                const rightX = getScreenX(29.73);
                
                ctx.strokeStyle = '#eab308'; // Yellow-500
                ctx.lineWidth = ppy * 0.4; // Scale thickness
                ctx.lineCap = 'round';
                
                // Support post
                const centerX = getScreenX(FIELD_WIDTH_YARDS/2);
                ctx.beginPath();
                ctx.moveTo(centerX, postY);
                ctx.lineTo(centerX, postY + ppy * 3); // Goes into ground back away from screen
                ctx.stroke();
                
                // Crossbar
                ctx.beginPath();
                ctx.moveTo(leftX, postY);
                ctx.lineTo(rightX, postY);
                ctx.stroke();
                
                // Uprights
                ctx.beginPath();
                ctx.moveTo(leftX, postY);
                ctx.lineTo(leftX, postY - ppy * 8); // extends UP the screen (smaller Y)
                ctx.moveTo(rightX, postY);
                ctx.lineTo(rightX, postY - ppy * 8);
                ctx.stroke();
            }
        }
    }

    function drawEntities() {
        if (gameState === 'MENU') return;

        // Draw Cosmetic QB (Left behind after pass)
        if (cosmeticQB) {
            const cqScreenX = getScreenX(cosmeticQB.x);
            const cqScreenY = getScreenY(cosmeticQB.y);
            const pRadiusPx = player.radius * ppy;
            ctx.beginPath();
            ctx.arc(cqScreenX, cqScreenY, pRadiusPx, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#ffffff';
            ctx.stroke();
            // Gray out slightly to show inactive
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fill();
        }

        // Draw All Wide Receivers and TEs
        for (let w of wrs) {
            if (w.active) {
                const wrScreenX = getScreenX(w.x);
                const wrScreenY = getScreenY(w.y);
                const pRadiusPx = player.radius * ppy;
                ctx.beginPath();
                ctx.arc(wrScreenX, wrScreenY, pRadiusPx, 0, Math.PI * 2);
                ctx.fillStyle = w.color;
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#ffffff';
                ctx.stroke();
            }
        }

        // Draw Offensive Linemen
        for (let ol of oLinemen) {
            const olScreenX = getScreenX(ol.x);
            const olScreenY = getScreenY(ol.y);
            const olRadiusPx = ol.radius * ppy;
            ctx.beginPath();
            ctx.arc(olScreenX, olScreenY, olRadiusPx, 0, Math.PI * 2);
            ctx.fillStyle = ol.color;
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#ffffff';
            ctx.stroke();
        }

        const pScreenX = getScreenX(player.x);
        const pScreenY = getScreenY(player.y);
        const pRadiusPx = player.radius * ppy;

        // Draw Player
        ctx.beginPath();
        ctx.arc(pScreenX, pScreenY, pRadiusPx, 0, Math.PI * 2);
        ctx.fillStyle = player.color;
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#ffffff';
        ctx.stroke();

        // Draw a tiny football on the player (only if they have it)
        if (!kickedBall.active && gameState !== 'FIELD_GOAL_AIMING' && gameState !== 'PASS_IN_AIR') {
            ctx.beginPath();
            ctx.ellipse(pScreenX + pRadiusPx*0.4, pScreenY - pRadiusPx*0.2, pRadiusPx*0.5, pRadiusPx*0.3, Math.PI/4, 0, Math.PI*2);
            ctx.fillStyle = '#8b4513';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        // Draw Passed Ball
        if (gameState === 'PASS_IN_AIR' && passObj.active) {
            const bScreenX = getScreenX(passObj.x);
            const bScreenY = getScreenY(passObj.y);
            const bRadiusPx = (player.radius * 0.6) * ppy * passObj.size; // Scales for depth

            ctx.beginPath();
            ctx.ellipse(bScreenX, bScreenY, bRadiusPx, bRadiusPx*0.6, Math.PI/4, 0, Math.PI*2);
            ctx.fillStyle = '#8b4513';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.stroke();
            
            // Laces
            ctx.beginPath();
            ctx.moveTo(bScreenX - bRadiusPx*0.5, bScreenY);
            ctx.lineTo(bScreenX + bRadiusPx*0.5, bScreenY);
            ctx.stroke();
        }

        // Draw Kicked Ball
        if (gameState === 'FIELD_GOAL_KICKED' && kickedBall.active) {
            const bScreenX = getScreenX(kickedBall.x);
            const bScreenY = getScreenY(kickedBall.y);
            const bRadiusPx = (player.radius * 0.6) * ppy * kickedBall.size; // Shrinks for depth

            ctx.beginPath();
            ctx.ellipse(bScreenX, bScreenY, bRadiusPx, bRadiusPx*0.6, 0, 0, Math.PI*2);
            ctx.fillStyle = '#8b4513';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.stroke();
            
            // Laces
            ctx.beginPath();
            ctx.moveTo(bScreenX - bRadiusPx*0.5, bScreenY);
            ctx.lineTo(bScreenX + bRadiusPx*0.5, bScreenY);
            ctx.stroke();
        }

        // Draw Kicking Meter UI
        if (gameState === 'FIELD_GOAL_AIMING') {
            const meterWidth = ppy * 16;
            const meterHeight = ppy * 1.5;
            const meterX = getScreenX(FIELD_WIDTH_YARDS/2) - meterWidth/2;
            const meterY = getScreenY(player.y) - ppy * 5; // floating above player
            
            // Background
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(meterX, meterY, meterWidth, meterHeight);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(meterX, meterY, meterWidth, meterHeight);
            
            // Good zone (center 20%)
            const goodZoneW = meterWidth * 0.2;
            const goodZoneX = meterX + (meterWidth/2) - (goodZoneW/2);
            ctx.fillStyle = '#10b981'; // Green
            ctx.fillRect(goodZoneX, meterY, goodZoneW, meterHeight);
            
            // Cursor
            const cursorX = meterX + (kickingMeter.pos / 100) * meterWidth;
            ctx.fillStyle = '#fbbf24'; // Yellow
            ctx.fillRect(cursorX - 2, meterY - 4, 4, meterHeight + 8);
        }

        // Draw Defenders
        for (let def of defenders) {
            const dScreenX = getScreenX(def.x);
            const dScreenY = getScreenY(def.y);
            const dRadiusPx = def.radius * ppy;

            ctx.beginPath();
            ctx.arc(dScreenX, dScreenY, dRadiusPx, 0, Math.PI * 2);
            ctx.fillStyle = def.color;
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#000000';
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(dScreenX - dRadiusPx*0.4, dScreenY - dRadiusPx*0.2);
            ctx.lineTo(dScreenX + dRadiusPx*0.4, dScreenY + dRadiusPx*0.2);
            ctx.moveTo(dScreenX + dRadiusPx*0.4, dScreenY - dRadiusPx*0.2);
            ctx.lineTo(dScreenX - dRadiusPx*0.4, dScreenY + dRadiusPx*0.2);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
    }

    // --- MAIN GAME LOOP ---
    function gameLoop() {
        update();
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawField();
        drawEntities();

        requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);

</script>
