<body>

<script>
    /**
     * GRIDIRON RUSH - HTML5 Canvas Game Engine
     */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const overlayMenu = document.getElementById('overlay-menu');
    const startBtn = document.getElementById('start-btn');
    const hud = document.getElementById('hud');
    const overlayMessage = document.getElementById('overlay-message');
    const bigMessage = document.getElementById('big-message');
    
    const overlaySnap = document.getElementById('overlay-snap');
    const snapBtn = document.getElementById('snap-btn');
    const overlayKick = document.getElementById('overlay-kick');
    const kickBtn = document.getElementById('kick-btn');
    const overlayPunt = document.getElementById('overlay-punt');
    const puntBtn = document.getElementById('punt-btn');
    const passBtn = document.getElementById('pass-btn');

    // HUD Text Elements
    const timerDisplay = document.getElementById('timerDisplay');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const possessionDisplay = document.getElementById('possessionDisplay');
    const downDisplay = document.getElementById('downDisplay');
    const yardLineDisplay = document.getElementById('yardLineDisplay');

    // --- GAME CONSTANTS & VARIABLES ---
    const FIELD_WIDTH_YARDS = 53.3; 
    const FIELD_LENGTH_YARDS = 100;
    
    let ppy = 10; 
    let cameraY = 0; 

    // Game States: MENU, PRE_SNAP, PLAYING, ANIMATING, FIELD_GOAL_AIMING, FIELD_GOAL_KICKED, GAME_OVER
    let gameState = 'MENU'; 
    let difficultyLevel = 1;

    // Time & Football Rules State
    let gameTimeRemaining = 300; // 5 minutes (in seconds)
    let lastFrameTime = performance.now();
    let timeExpired = false;

    let scoreHome = 0;
    let scoreAway = 0;
    let possession = 'HOME'; // 'HOME' or 'AWAY'
    let down = 1;
    let lineOfScrimmage = 20; // Starts at own 20
    let firstDownLine = 30;
    
    // Entities
    const player = {
        x: FIELD_WIDTH_YARDS / 2,
        y: 20,
        radius: 0.8, 
        speed: 0.16, 
        vx: 0,
        vy: 0,
        color: '#3b82f6' 
    };

    let defenders = [];
    
    // Field Goal minigame variables
    let kickingMeter = { pos: 50, dir: 1, speed: 2 };
    let kickedBall = { active: false, x: 0, y: 0, vx: 0, vy: 0, size: 1, timer: 0 };

    // Passing Mechanics Variables
    let hasCrossedLOS = false;
    let wrs = []; 
    let oLinemen = []; 
    let cosmeticQB = null; 
    let passObj = { active: false, x: 0, y: 0, startDist: 0, size: 1, targetWrIndex: -1 };

    // Input State
    const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, a: false, s: false, d: false };
    const pointer = { active: false, x: 0, y: 0 }; 

    // --- SOUND ENGINE (Web Audio API) ---
    const sfx = {
        ctx: null,
        init() {
            if (!this.ctx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();
            }
            if (this.ctx.state === 'suspended') this.ctx.resume();
        },
        playOsc(freq, type, duration, vol = 0.1, slideFreq = null) {
            if (!this.ctx) return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            if (slideFreq) {
                osc.frequency.exponentialRampToValueAtTime(slideFreq, this.ctx.currentTime + duration);
            }
            gain.gain.setValueAtTime(vol, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + duration);
        },
        playNoise(duration, vol=0.1) {
            if (!this.ctx) return;
            const bufferSize = this.ctx.sampleRate * duration;
            const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = this.ctx.createBufferSource();
            noise.buffer = buffer;
            const gain = this.ctx.createGain();
            gain.gain.setValueAtTime(vol, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
            const filter = this.ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 1000;
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(this.ctx.destination);
            noise.start();
        },
        whistle() {
            this.playOsc(2000, 'sine', 0.4, 0.1);
            setTimeout(() => this.playOsc(2200, 'sine', 0.5, 0.1), 100);
        },
        tackle() {
            this.playOsc(150, 'sine', 0.3, 0.3, 50);
            this.playNoise(0.2, 0.4); 
        },
        kick() {
            this.playOsc(200, 'sine', 0.15, 0.4, 40);
        },
        success() { 
            this.playOsc(440, 'square', 0.1, 0.05);
            setTimeout(() => this.playOsc(554, 'square', 0.2, 0.05), 100);
            setTimeout(() => this.playOsc(659, 'square', 0.4, 0.05), 200);
        },
        fail() { 
            this.playOsc(300, 'sawtooth', 0.5, 0.1, 150);
        },
        touchdown() {
            const notes = [440, 554, 659, 880];
            notes.forEach((freq, i) => {
                setTimeout(() => this.playOsc(freq, 'square', 0.5, 0.05), i * 150);
            });
            setTimeout(() => {
                if(!this.ctx) return;
                const noise = this.ctx.createBufferSource();
                const buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * 2, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for(let i=0; i<buffer.length; i++) data[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 1000;
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.2, this.ctx.currentTime + 0.5);
                gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2);
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                noise.start();
            }, 100);
        }
    };

    // --- INITIALIZATION & RESIZING ---
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ppy = canvas.width / FIELD_WIDTH_YARDS;
        if (ppy > canvas.height / 30) ppy = canvas.height / 30; 
    }
    window.addEventListener('resize', resize);
    resize();

    // --- INPUT HANDLING ---
    window.addEventListener('keydown', (e) => {
        if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
        if (e.key === ' ' && gameState === 'PRE_SNAP') snapBall();
        if (e.key === ' ' && gameState === 'FIELD_GOAL_AIMING') executeKick();
        if (e.key === ' ' && gameState === 'PUNT_AIMING') executePunt();
        if (e.key === ' ' && gameState === 'PLAYING') throwPass();
    });
    window.addEventListener('keyup', (e) => {
        if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
    });

    function handlePointerDown(e) {
        if (gameState !== 'PLAYING') return;
        pointer.active = true;
        updatePointerPos(e);
    }
    function handlePointerMove(e) {
        if (!pointer.active || gameState !== 'PLAYING') return;
        updatePointerPos(e);
    }
    function handlePointerUp() { pointer.active = false; }
    function updatePointerPos(e) {
        pointer.x = e.touches ? e.touches[0].clientX : e.clientX;
        pointer.y = e.touches ? e.touches[0].clientY : e.clientY;
    }

    canvas.addEventListener('mousedown', handlePointerDown);
    canvas.addEventListener('mousemove', handlePointerMove);
    window.addEventListener('mouseup', handlePointerUp);
    canvas.addEventListener('touchstart', handlePointerDown, {passive: false});
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handlePointerMove(e); }, {passive: false});
    window.addEventListener('touchend', handlePointerUp);

    startBtn.addEventListener('click', startGame);
    snapBtn.addEventListener('click', snapBall);
    kickBtn.addEventListener('click', executeKick);
    puntBtn.addEventListener('click', executePunt);
    passBtn.addEventListener('click', throwPass);

    // --- CORE GAME LOGIC ---

    function startGame() {
        sfx.init();
        sfx.whistle();
        
        // Reset Game Variables
        scoreHome = 0;
        scoreAway = 0;
        possession = 'HOME';
        difficultyLevel = 1;
        gameTimeRemaining = 300;
        timeExpired = false;
        lastFrameTime = performance.now();

        // Restore Title Screen HTML in case we are coming from a Game Over
        document.getElementById('menu-title').innerHTML = `GRIDIRON<span class="text-red-500"> RUSH</span>`;
        document.getElementById('menu-title').style.color = '#fff';
        document.getElementById('menu-subtitle').innerText = "Score Touchdowns, Kick PATs, and flip possession on Turnovers!";
        
        resetDrive(20);
        updateHUD();
        gameState = 'PRE_SNAP';
        
        overlayMenu.classList.add('hidden');
        hud.style.display = 'block';
        setupPreSnap();
    }

    function resetDrive(startYard) {
        lineOfScrimmage = startYard;
        down = 1;
        firstDownLine = lineOfScrimmage + 10;
        setupPreSnap();
    }

    function executeTurnover(newLOS) {
        possession = possession === 'HOME' ? 'AWAY' : 'HOME';
        let teamColor = possession === 'HOME' ? '#60a5fa' : '#f87171';
        showBigMessage(possession + ' BALL!', teamColor, () => {
            resetDrive(newLOS);
        });
    }

    function handleTimeExpired() {
        gameState = 'GAME_OVER';
        overlaySnap.classList.add('hidden');
        overlayKick.classList.add('hidden');
        overlayPunt.classList.add('hidden');
        
        sfx.whistle();
        setTimeout(() => sfx.whistle(), 400);
        setTimeout(() => sfx.whistle(), 800);
        
        let winMsg = "TIE GAME!";
        let winColor = "#fff";
        if (scoreHome > scoreAway) {
            winMsg = "HOME WINS!";
            winColor = "#60a5fa";
        } else if (scoreAway > scoreHome) {
            winMsg = "AWAY WINS!";
            winColor = "#f87171";
        }

        showBigMessage("TIME'S UP!", "#fbbf24", () => {
            hud.style.display = 'none';
            overlayMenu.classList.remove('hidden');
            document.getElementById('menu-title').innerHTML = winMsg;
            document.getElementById('menu-title').style.color = winColor;
            document.getElementById('menu-subtitle').innerText = `Final Score: Home ${scoreHome} - Away ${scoreAway}`;
            startBtn.innerText = 'PLAY AGAIN';
        }, 3000);
    }

    function setupPreSnap() {
        player.x = FIELD_WIDTH_YARDS / 2;
        player.y = Math.max(1, lineOfScrimmage - 4); 
        player.vx = 0;
        player.vy = 0;
        pointer.active = false;
        kickedBall.active = false;
        hasCrossedLOS = false;
        
        // Define uniform colors based on current possession
        const pColor = possession === 'HOME' ? '#3b82f6' : '#ef4444'; 
        const wrColor = possession === 'HOME' ? '#93c5fd' : '#fca5a5'; 
        const teColor = possession === 'HOME' ? '#60a5fa' : '#f87171'; 
        const olColor = possession === 'HOME' ? '#1e3a8a' : '#7f1d1d'; 

        player.color = pColor;

        wrs = [
            { active: true, x: FIELD_WIDTH_YARDS * 0.15, y: lineOfScrimmage, speed: player.speed * 1.05, color: wrColor, type: 'WR', isBlocking: false }, 
            { active: true, x: (FIELD_WIDTH_YARDS / 2) + 4.5, y: lineOfScrimmage, speed: player.speed * 1.0, color: teColor, type: 'TE', isBlocking: true, blockTimer: 60 }, 
            { active: true, x: FIELD_WIDTH_YARDS * 0.85, y: lineOfScrimmage, speed: player.speed * 1.08, color: wrColor, type: 'WR', isBlocking: false }  
        ];

        oLinemen = [
            { x: (FIELD_WIDTH_YARDS / 2) - 2.5, y: lineOfScrimmage + 0.5, radius: 0.9, color: olColor }, 
            { x: (FIELD_WIDTH_YARDS / 2), y: lineOfScrimmage + 0.5, radius: 0.9, color: olColor },
            { x: (FIELD_WIDTH_YARDS / 2) + 2.5, y: lineOfScrimmage + 0.5, radius: 0.9, color: olColor }
        ];

        cosmeticQB = null;
        passObj.active = false;
        passObj.targetWrIndex = -1;
        passBtn.classList.add('hidden');
        defenders = [];
        
        overlaySnap.classList.remove('hidden');
        gameState = 'PRE_SNAP';
        updateHUD();
        centerCamera();
    }

    function snapBall() {
        sfx.init();
        sfx.whistle();
        overlaySnap.classList.add('hidden');
        passBtn.classList.remove('hidden');
        gameState = 'PLAYING';
        spawnDefenders();
    }

    function throwPass() {
        let activeWrs = wrs.filter(w => w.active && !w.isBlocking);
        if (gameState !== 'PLAYING' || hasCrossedLOS || activeWrs.length === 0) return;
        
        gameState = 'PASS_IN_AIR';
        passBtn.classList.add('hidden');
        sfx.playNoise(0.2, 0.1); 
        
        let mostOpenWrIndex = 0;
        let bestScore = -99999;

        for (let i = 0; i < wrs.length; i++) {
            let wr = wrs[i];
            if (!wr.active || wr.isBlocking) continue; 
            
            let minDefDist = 999;
            for (let def of defenders) {
                if (def.isCB || def.isSafety) {
                    let dist = Math.hypot(def.x - wr.x, def.y - wr.y);
                    if (dist < minDefDist) minDefDist = dist;
                }
            }
            let throwDist = Math.hypot(wr.x - player.x, wr.y - player.y);
            let score = (minDefDist * 15) - throwDist;
            if (minDefDist < 2.5) score -= 500; 
            
            if (score > bestScore) {
                bestScore = score;
                mostOpenWrIndex = i;
            }
        }

        passObj.targetWrIndex = mostOpenWrIndex;
        let targetWR = wrs[mostOpenWrIndex];
        targetWR.color = '#fef08a'; 
        
        passObj.active = true;
        passObj.x = player.x;
        passObj.y = player.y;
        passObj.startDist = Math.hypot(targetWR.x - player.x, targetWR.y - player.y);
        pointer.active = false; 
    }

    function spawnDefenders() {
        defenders = [];
        let baseDefSpeed = player.speed * (0.75 + (difficultyLevel * 0.02)); 
        if (baseDefSpeed > player.speed * 0.95) baseDefSpeed = player.speed * 0.95; 

        // Opponent Colors
        const defMain = possession === 'HOME' ? '#ef4444' : '#3b82f6';
        const defDark = possession === 'HOME' ? '#7f1d1d' : '#1e3a8a';
        const defSafety = possession === 'HOME' ? '#b91c1c' : '#1d4ed8';

        const dlOffsets = [-2.5, 0, 2.5];
        for (let offset of dlOffsets) {
            defenders.push({
                x: (FIELD_WIDTH_YARDS / 2) + offset,
                y: lineOfScrimmage + 1.5,
                radius: 0.9,
                speed: baseDefSpeed * 0.85, 
                color: defDark, 
                targetWrIndex: -1,
                isDL: true,
                engaged: false
            });
        }

        let numLinebackers = Math.min(5, 2 + Math.floor(difficultyLevel / 3));
        for (let i = 0; i < numLinebackers; i++) {
            let defX = (FIELD_WIDTH_YARDS / (numLinebackers + 1)) * (i + 1);
            let defY = lineOfScrimmage + 4 + (Math.random() * 5); 
            
            defenders.push({
                x: defX, y: defY, radius: 0.85, speed: baseDefSpeed * (0.9 + Math.random() * 0.2), color: defMain, targetWrIndex: -1
            });
        }

        let blownCoverageIndex = Math.floor(Math.random() * wrs.length);
        wrs.forEach((w, index) => {
            // Increased both the blown coverage speed and the tight coverage speed
            let coverageMultiplier = (index === blownCoverageIndex) 
                ? 0.70 + (Math.random() * 0.15) // Was 0.60 + 0.15
                : 0.92 + (Math.random() * 0.08); // Was 0.85 + 0.08

            defenders.push({ 
                x: w.x, y: lineOfScrimmage + 3, radius: 0.8, speed: w.speed * coverageMultiplier, color: defMain, targetWrIndex: index, isCB: true 
            });
        });

        let safetyDepth = Math.min(105, lineOfScrimmage + 15 + (Math.random() * 4)); 
        let safetySpeed = player.speed * (0.90 + (difficultyLevel * 0.015)); 
        if (safetySpeed > player.speed * 1.04) safetySpeed = player.speed * 1.04; 

        defenders.push({ x: FIELD_WIDTH_YARDS * 0.25, y: safetyDepth, radius: 0.8, speed: safetySpeed, color: defSafety, isSafety: true });
        defenders.push({ x: FIELD_WIDTH_YARDS * 0.75, y: safetyDepth, radius: 0.8, speed: safetySpeed, color: defSafety, isSafety: true });
    }

    function setupFieldGoal() {
        gameState = 'FIELD_GOAL_AIMING';
        player.x = FIELD_WIDTH_YARDS / 2;
        player.y = 85; 
        player.vx = 0; player.vy = 0;
        defenders = []; kickedBall.active = false;
        
        kickingMeter.pos = Math.random() * 100;
        kickingMeter.dir = Math.random() > 0.5 ? 1 : -1;
        kickingMeter.speed = Math.min(5, 1.5 + (difficultyLevel * 0.3)); 
        
        downDisplay.innerText = 'EXTRA POINT';
        yardLineDisplay.innerText = 'OPP 15';
        
        overlayKick.classList.remove('hidden');
        passBtn.classList.add('hidden');
    }

    function executeKick() {
        sfx.kick();
        overlayKick.classList.add('hidden');
        gameState = 'FIELD_GOAL_KICKED';
        kickedBall.active = true; kickedBall.x = player.x; kickedBall.y = player.y; kickedBall.size = 1;
        kickedBall.vy = 0.5; 
        kickedBall.vx = ((kickingMeter.pos - 50) / 50) * 0.3; 
    }

    function setupPunt() {
        gameState = 'PUNT_AIMING';
        player.x = FIELD_WIDTH_YARDS / 2;
        player.y = Math.max(1, lineOfScrimmage - 5);
        player.vx = 0; player.vy = 0;
        defenders = []; wrs = []; oLinemen = []; kickedBall.active = false;
        
        kickingMeter.pos = Math.random() * 100;
        kickingMeter.dir = Math.random() > 0.5 ? 1 : -1;
        kickingMeter.speed = Math.min(6, 2 + (difficultyLevel * 0.4)); 
        
        downDisplay.innerText = '4TH DOWN PUNT';
        overlayPunt.classList.remove('hidden');
        passBtn.classList.add('hidden');
    }

    function executePunt() {
        sfx.kick();
        overlayPunt.classList.add('hidden');
        gameState = 'PUNT_KICKED';
        kickedBall.active = true; kickedBall.x = player.x; kickedBall.y = player.y;
        kickedBall.size = 1; kickedBall.timer = 0;
        kickedBall.vy = 0.8; 
        kickedBall.vx = ((kickingMeter.pos - 50) / 50) * 0.4; 
    }

    function handleKickResult(isGood) {
        gameState = 'ANIMATING';
        if (isGood) {
            sfx.success();
            if (possession === 'HOME') scoreHome += 1; else scoreAway += 1;
            updateHUD();
            showBigMessage("IT'S GOOD!", '#34d399', () => { executeTurnover(20); });
        } else {
            sfx.fail();
            showBigMessage("NO GOOD!", '#ef4444', () => { executeTurnover(20); });
        }
    }

    function update() {
        if (gameState === 'FIELD_GOAL_AIMING' || gameState === 'PUNT_AIMING') {
            kickingMeter.pos += kickingMeter.speed * kickingMeter.dir;
            if (kickingMeter.pos >= 100) { kickingMeter.pos = 100; kickingMeter.dir = -1; }
            if (kickingMeter.pos <= 0) { kickingMeter.pos = 0; kickingMeter.dir = 1; }
            centerCamera(); return;
        }

        if (gameState === 'PUNT_KICKED') {
            kickedBall.x += kickedBall.vx; kickedBall.y += kickedBall.vy; kickedBall.timer++;
            kickedBall.size = 1 - Math.sin((kickedBall.timer / 80) * Math.PI) * 0.5; 
            if (kickedBall.timer >= 80) {
                gameState = 'ANIMATING';
                sfx.whistle();
                // Rough estimate of punt distance (average 45 yards from punter)
                let puntDistance = 45 + (Math.random() * 10);
                let newLOS = 100 - (player.y + puntDistance);
                if (newLOS < 1) newLOS = 20; // Touchback
                
                showBigMessage("PUNT AWAY!", '#3b82f6', () => { executeTurnover(newLOS); });
            }
            centerCamera(kickedBall.y); return;
        }

        if (gameState === 'FIELD_GOAL_KICKED') {
            kickedBall.x += kickedBall.vx; kickedBall.y += kickedBall.vy;
            kickedBall.size -= 0.003; if (kickedBall.size < 0.4) kickedBall.size = 0.4;
            if (kickedBall.y >= 110) {
                if (kickedBall.x > 23.57 && kickedBall.x < 29.73) handleKickResult(true);
                else handleKickResult(false);
            }
            centerCamera(); return;
        }

        if (gameState === 'PLAYING' || gameState === 'PASS_IN_AIR') {
            for (let w of wrs) {
                if (!w.active) continue;
                if (w.type === 'TE' && w.blockTimer > 0) {
                    w.blockTimer--; w.isBlocking = true;
                    let nearestDef = null; let minDist = 999;
                    for (let def of defenders) {
                        if (def.isDL || (!def.isCB && !def.isSafety)) {
                            let d = Math.hypot(def.x - w.x, def.y - w.y);
                            if (d < minDist) { minDist = d; nearestDef = def; }
                        }
                    }
                    if (nearestDef) {
                        if (minDist > 1.2 && minDist < 3.0) {
                            w.x += (nearestDef.x - w.x) * 0.1; w.y += (nearestDef.y - w.y) * 0.1;
                        } else if (minDist <= 1.2) nearestDef.engaged = true; 
                    }
                } else {
                    w.isBlocking = false; w.y += w.speed; 
                }
                w.x = Math.max(1, Math.min(FIELD_WIDTH_YARDS - 1, w.x));
                w.y = Math.min(108, w.y); 
            }
        }

        if (gameState === 'PASS_IN_AIR') {
            let targetWR = wrs[passObj.targetWrIndex];
            const dx = targetWR.x - passObj.x; const dy = targetWR.y - passObj.y;
            const dist = Math.hypot(dx, dy); const passSpeed = player.speed * 4;

            for (let def of defenders) {
                let dxDef = targetWR.x - def.x; let dyDef = targetWR.y - def.y;
                let distDef = Math.hypot(dxDef, dyDef);
                if (distDef > 0) {
                    def.x += (dxDef / distDef) * def.speed; def.y += (dyDef / distDef) * def.speed;
                }
            }

            if (dist < passSpeed) {
                let brokenUp = false;
                for (let def of defenders) {
                    if (def.isCB || def.isSafety) {
                        if (Math.hypot(def.x - targetWR.x, def.y - targetWR.y) < def.radius + 0.1) {
                            brokenUp = true; break;
                        }
                    }
                }
                if (brokenUp) { handleIncompletePass("PASS BROKEN UP!"); return; }

                sfx.kick();
                cosmeticQB = { x: player.x, y: player.y };
                player.x = targetWR.x; player.y = targetWR.y;
                player.vx = 0; player.vy = targetWR.speed;
                for (let w of wrs) w.active = false;
                passObj.active = false; gameState = 'PLAYING';
                
                for (let def of defenders) { def.targetWrIndex = -1; def.isCB = false; }
            } else {
                passObj.x += (dx / dist) * passSpeed; passObj.y += (dy / dist) * passSpeed;
                const progress = 1 - (dist / passObj.startDist);
                passObj.size = 1 + Math.sin(progress * Math.PI) * 1.5;

                if (passObj.size < 1.2 && dist > 2.0) {
                    for (let def of defenders) {
                        if (Math.hypot(def.x - passObj.x, def.y - passObj.y) < def.radius) {
                            if (def.isCB || def.isSafety) {
                                handleIncompletePass("PASS DEFLECTED!"); return;
                            } else {
                                sfx.fail();
                                showBigMessage("INTERCEPTED!", "#ef4444", () => {
                                    let newLOS = 100 - passObj.y;
                                    if (newLOS < 1) newLOS = 20; // Touchback
                                    if (newLOS > 99) newLOS = 99;
                                    executeTurnover(newLOS);
                                });
                                return;
                            }
                        }
                    }
                }
                if (passObj.y > 110) { handleIncompletePass("INCOMPLETE"); return; }
            }
            centerCamera(passObj.y); return; 
        }

        if (gameState !== 'PLAYING') return;

        let moveX = 0; let moveY = 0;
        if (keys.ArrowUp || keys.w) moveY = 1; if (keys.ArrowDown || keys.s) moveY = -1;
        if (keys.ArrowLeft || keys.a) moveX = -1; if (keys.ArrowRight || keys.d) moveX = 1;

        if (pointer.active) {
            const screenPlayerX = (player.x - (FIELD_WIDTH_YARDS/2)) * ppy + (canvas.width/2);
            const screenPlayerY = getScreenY(player.y);
            const dx = pointer.x - screenPlayerX; const dy = pointer.y - screenPlayerY;
            const distance = Math.hypot(dx, dy);
            if (distance > 10) { moveX = dx / distance; moveY = -dy / distance; }
        }

        if (moveX !== 0 && moveY !== 0 && !pointer.active) {
            const length = Math.hypot(moveX, moveY); moveX /= length; moveY /= length;
        }

        player.vx = moveX * player.speed; player.vy = moveY * player.speed;
        player.x += player.vx; player.y += player.vy;
        player.x = Math.max(player.radius, Math.min(FIELD_WIDTH_YARDS - player.radius, player.x));
        player.y = Math.max(0, player.y);

        if (player.y > lineOfScrimmage + 0.5 && !hasCrossedLOS) {
            hasCrossedLOS = true; passBtn.classList.add('hidden');
        }

        for (let ol of oLinemen) {
            let nearestDL = null; let minDist = 999;
            for (let def of defenders) {
                if (def.isDL) {
                    let d = Math.hypot(def.x - ol.x, def.y - ol.y);
                    if (d < minDist) { minDist = d; nearestDL = def; }
                }
            }
            if (nearestDL) {
                if (minDist > 1.2) {
                    ol.x += (nearestDL.x - ol.x) * 0.1; ol.y += (nearestDL.y - ol.y) * 0.1;
                } else nearestDL.engaged = true; 
            }
        }

        for (let def of defenders) {
            let currentSpeed = def.speed;
            if (def.engaged) {
                currentSpeed *= 0.15; 
                if (Math.random() < 0.04) def.engaged = false; 
            }

            if (def.isCB && def.targetWrIndex !== -1 && wrs[def.targetWrIndex] && wrs[def.targetWrIndex].active) {
                let assignedWR = wrs[def.targetWrIndex];
                if (assignedWR.isBlocking) {
                    def.x += (assignedWR.x - def.x) * 0.1; def.y += (assignedWR.y + 4 - def.y) * 0.1; 
                } else {
                    def.x += (assignedWR.x - def.x) * 0.15; def.y += def.speed; 
                    if (Math.hypot(assignedWR.x - def.x, assignedWR.y - def.y) < 1.0) def.x += (Math.random() - 0.5) * 0.2;
                }
                continue; 
            }

            let targetX = player.x; let targetY = player.y;
            let targetVx = player.vx; let targetVy = player.vy;

            if (def.isSafety) {
                const distToTarget = Math.hypot(targetX - def.x, targetY - def.y);
                const lookAhead = Math.min(25, distToTarget * 2); 
                targetX += targetVx * lookAhead; targetY += targetVy * lookAhead;
            }

            const dx = targetX - def.x; const dy = targetY - def.y;
            const dist = Math.hypot(dx, dy);

            if (dist > 0) {
                def.x += (dx / dist) * currentSpeed; def.y += (dy / dist) * currentSpeed;
            }

            const actualDist = Math.hypot(player.x - def.x, player.y - def.y);
            if (actualDist < (player.radius + def.radius) * 0.9) {
                handleTackle(); return; 
            }
        }

        if (player.y >= 100) { handleTouchdown(); return; }
        centerCamera();
    }

    function handleIncompletePass(msg) {
        gameState = 'ANIMATING';
        sfx.fail();
        showBigMessage(msg, "#fbbf24", () => {
            down++;
            if (down === 4) {
                let distance = Math.ceil(firstDownLine - lineOfScrimmage);
                if (distance >= 5) showBigMessage("4TH DOWN - PUNTING", "#fbbf24", () => setupPunt());
                else showBigMessage("4TH DOWN - GOING FOR IT!", "#fbbf24", () => setupPreSnap());
            } else if (down > 4) {
                showBigMessage('TURNOVER ON DOWNS', '#ef4444', () => {
                    let newLOS = 100 - lineOfScrimmage;
                    if(newLOS > 99) newLOS = 99;
                    executeTurnover(newLOS);
                });
            } else { setupPreSnap(); }
        });
    }

    function centerCamera(focusY = null) {
        if (gameState === 'FIELD_GOAL_AIMING' || gameState === 'FIELD_GOAL_KICKED') {
            let targetCameraY = Math.min(80, 115 - (canvas.height / ppy));
            cameraY += (targetCameraY - cameraY) * 0.1; return;
        }

        const desiredScreenY = canvas.height * 0.75;
        let targetY = focusY !== null ? focusY : player.y;
        let targetCameraY = targetY - ((canvas.height - desiredScreenY) / ppy);
        
        if (gameState === 'PRE_SNAP' || gameState === 'PUNT_AIMING') cameraY = targetCameraY; 
        else cameraY += (targetCameraY - cameraY) * 0.1; 

        const visibleYards = canvas.height / ppy;
        if (cameraY < -5) cameraY = -5;
        if (cameraY + visibleYards > 105) cameraY = 105 - visibleYards;
    }

    function handleTackle() {
        gameState = 'ANIMATING';
        pointer.active = false;
        sfx.tackle();
        
        let forwardProgress = Math.max(lineOfScrimmage, player.y);
        if (player.y < lineOfScrimmage) forwardProgress = Math.max(1, player.y);

        const yardsGained = forwardProgress - lineOfScrimmage;
        lineOfScrimmage = forwardProgress;

        if (lineOfScrimmage >= firstDownLine) {
            setTimeout(() => sfx.success(), 400); 
            down = 1; firstDownLine = lineOfScrimmage + 10;
            showBigMessage('FIRST DOWN!', '#34d399', () => setupPreSnap());
        } else {
            down++;
            if (down === 4) {
                let distance = Math.ceil(firstDownLine - lineOfScrimmage);
                if (distance >= 5) showBigMessage('TACKLED!', '#fbbf24', () => { showBigMessage('4TH DOWN - PUNTING', '#fbbf24', () => setupPunt()); });
                else showBigMessage('TACKLED!', '#fbbf24', () => { showBigMessage('4TH DOWN - GOING FOR IT!', '#fbbf24', () => setupPreSnap()); });
            } else if (down > 4) {
                setTimeout(() => sfx.fail(), 400);
                showBigMessage('TURNOVER ON DOWNS', '#ef4444', () => {
                    let newLOS = 100 - lineOfScrimmage;
                    if(newLOS > 99) newLOS = 99;
                    executeTurnover(newLOS);
                });
            } else {
                showBigMessage('TACKLED!', '#fbbf24', () => setupPreSnap());
            }
        }
    }

    function handleTouchdown() {
        gameState = 'ANIMATING';
        pointer.active = false;
        sfx.touchdown();
        if (possession === 'HOME') scoreHome += 6; else scoreAway += 6;
        difficultyLevel++;
        updateHUD();

        showBigMessage('TOUCHDOWN!', possession === 'HOME' ? '#60a5fa' : '#f87171', () => {
            setupFieldGoal();
        });
    }

    function showBigMessage(text, color, callback, delay = 1500) {
        bigMessage.innerText = text;
        bigMessage.style.color = color;
        overlayMessage.classList.remove('hidden');
        setTimeout(() => { overlayMessage.classList.add('hidden'); if (callback) callback(); }, delay);
    }

    function updateHUD() {
        scoreDisplay.innerHTML = `<span class="team-blue">${scoreHome}</span> - <span class="team-red">${scoreAway}</span>`;
        possessionDisplay.innerText = possession + ' BALL';
        possessionDisplay.style.color = possession === 'HOME' ? '#60a5fa' : '#f87171';
        
        if (gameState === 'FIELD_GOAL_AIMING' || gameState === 'FIELD_GOAL_KICKED' || gameState === 'PUNT_AIMING' || gameState === 'PUNT_KICKED') return;

        let downSuffix = 'TH';
        if (down === 1) downSuffix = 'ST';
        else if (down === 2) downSuffix = 'ND';
        else if (down === 3) downSuffix = 'RD';
        
        let distance = Math.ceil(firstDownLine - lineOfScrimmage);
        let distText = distance;
        if (firstDownLine >= 100) distText = 'GOAL';
        else if (distance <= 0) distText = 'INCHES'; 

        downDisplay.innerText = `${down}${downSuffix} & ${distText}`;

        let yardText = '';
        let currentYardInt = Math.floor(lineOfScrimmage);
        if (currentYardInt === 50) yardText = '50';
        else if (currentYardInt < 50) yardText = `OWN ${currentYardInt}`;
        else yardText = `OPP ${100 - currentYardInt}`;
        
        yardLineDisplay.innerText = yardText;
    }

    // --- DRAWING FUNCTIONS ---

    function getScreenY(yardLine) { return canvas.height - ((yardLine - cameraY) * ppy); }
    function getScreenX(fieldX) {
        const fieldPixelWidth = FIELD_WIDTH_YARDS * ppy;
        return ((canvas.width - fieldPixelWidth) / 2) + (fieldX * ppy);
    }

    function drawField() {
        ctx.fillStyle = '#166534'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const startYard = Math.floor(cameraY); const endYard = Math.ceil(cameraY + (canvas.height / ppy));
        const leftSideline = getScreenX(0); const rightSideline = getScreenX(FIELD_WIDTH_YARDS);
        
        ctx.fillStyle = '#064e3b'; 
        ctx.fillRect(0, 0, leftSideline, canvas.height); ctx.fillRect(rightSideline, 0, canvas.width - rightSideline, canvas.height);

        ctx.strokeStyle = '#ffffff'; ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        
        for (let y = startYard; y <= endYard; y++) {
            if (y < 0 || y > 100) continue; 
            const screenY = getScreenY(y);
            if (y % 5 === 0) {
                ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(leftSideline, screenY); ctx.lineTo(rightSideline, screenY); ctx.stroke();
                if (y % 10 === 0 && y > 0 && y < 100) {
                    let displayNum = y > 50 ? 100 - y : y;
                    ctx.font = `bold ${ppy * 1.5}px 'Russo One', sans-serif`;
                    ctx.save(); ctx.translate(leftSideline + (ppy * 4), screenY); ctx.rotate(-Math.PI/2); ctx.fillText(displayNum, 0, 0); ctx.restore();
                    ctx.save(); ctx.translate(rightSideline - (ppy * 4), screenY); ctx.rotate(Math.PI/2); ctx.fillText(displayNum, 0, 0); ctx.restore();
                }
            } else {
                ctx.lineWidth = 1; const hashWidth = ppy * 0.5;
                const leftHash = getScreenX(FIELD_WIDTH_YARDS / 2 - 3); const rightHash = getScreenX(FIELD_WIDTH_YARDS / 2 + 3);
                ctx.beginPath();
                ctx.moveTo(leftHash - hashWidth, screenY); ctx.lineTo(leftHash + hashWidth, screenY);
                ctx.moveTo(rightHash - hashWidth, screenY); ctx.lineTo(rightHash + hashWidth, screenY); ctx.stroke();
            }
        }

        // Bottom Endzone (Own Endzone)
        if (cameraY <= 0) {
            const ezTop = getScreenY(0);
            ctx.fillStyle = possession === 'HOME' ? '#1e3a8a' : '#7f1d1d'; 
            ctx.fillRect(leftSideline, ezTop, rightSideline - leftSideline, canvas.height - ezTop);
            
            ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.font = `bold ${ppy * 4}px 'Russo One', sans-serif`;
            let txt = possession === 'HOME' ? 'HOME' : 'AWAY';
            ctx.fillText(txt, canvas.width/2, ezTop + (ppy*5));
        }
        
        // Top Endzone (Opponent Endzone)
        if (cameraY + (canvas.height/ppy) >= 100) {
            const ezBottom = getScreenY(100); const ezTop = getScreenY(110); 
            ctx.fillStyle = possession === 'HOME' ? '#7f1d1d' : '#1e3a8a'; 
            ctx.fillRect(leftSideline, Math.max(0, ezTop), rightSideline - leftSideline, ezBottom - Math.max(0, ezTop));
            
            if (ezTop > 0) { ctx.fillStyle = '#166534'; ctx.fillRect(leftSideline, 0, rightSideline - leftSideline, ezTop); }
            if (ezBottom > 0) {
                ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.font = `bold ${ppy * 4}px 'Russo One', sans-serif`;
                let txt = possession === 'HOME' ? 'AWAY' : 'HOME';
                ctx.fillText(txt, canvas.width/2, ezBottom - (ppy*5));
            }
        }

        if (gameState === 'PLAYING' || gameState === 'PRE_SNAP' || gameState === 'ANIMATING') {
            const losY = getScreenY(lineOfScrimmage);
            if (losY > 0 && losY < canvas.height) {
                ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(leftSideline, losY); ctx.lineTo(rightSideline, losY); ctx.stroke();
            }
            const fdY = getScreenY(firstDownLine);
            if (fdY > 0 && fdY < canvas.height && firstDownLine <= 100) {
                ctx.strokeStyle = '#facc15'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(leftSideline, fdY); ctx.lineTo(rightSideline, fdY); ctx.stroke();
            }
        }

        // Goalposts
        if (cameraY > 50) {
            const postY = getScreenY(110);
            if (postY > -100 && postY < canvas.height + 100) {
                const leftX = getScreenX(23.57); const rightX = getScreenX(29.73);
                ctx.strokeStyle = '#eab308'; ctx.lineWidth = ppy * 0.4; ctx.lineCap = 'round';
                
                const centerX = getScreenX(FIELD_WIDTH_YARDS/2);
                ctx.beginPath(); ctx.moveTo(centerX, postY); ctx.lineTo(centerX, postY + ppy * 3); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(leftX, postY); ctx.lineTo(rightX, postY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(leftX, postY); ctx.lineTo(leftX, postY - ppy * 8); 
                ctx.moveTo(rightX, postY); ctx.lineTo(rightX, postY - ppy * 8); ctx.stroke();
            }
        }
    }

    function drawEntities() {
        if (gameState === 'MENU') return;

        if (cosmeticQB) {
            const cqScreenX = getScreenX(cosmeticQB.x); const cqScreenY = getScreenY(cosmeticQB.y); const pRadiusPx = player.radius * ppy;
            ctx.beginPath(); ctx.arc(cqScreenX, cqScreenY, pRadiusPx, 0, Math.PI * 2);
            ctx.fillStyle = player.color; ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = '#ffffff'; ctx.stroke();
            ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fill();
        }

        for (let w of wrs) {
            if (w.active) {
                const wrScreenX = getScreenX(w.x); const wrScreenY = getScreenY(w.y); const pRadiusPx = player.radius * ppy;
                ctx.beginPath(); ctx.arc(wrScreenX, wrScreenY, pRadiusPx, 0, Math.PI * 2);
                ctx.fillStyle = w.color; ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = '#ffffff'; ctx.stroke();
            }
        }

        for (let ol of oLinemen) {
            const olScreenX = getScreenX(ol.x); const olScreenY = getScreenY(ol.y); const olRadiusPx = ol.radius * ppy;
            ctx.beginPath(); ctx.arc(olScreenX, olScreenY, olRadiusPx, 0, Math.PI * 2);
            ctx.fillStyle = ol.color; ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = '#ffffff'; ctx.stroke();
        }

        const pScreenX = getScreenX(player.x); const pScreenY = getScreenY(player.y); const pRadiusPx = player.radius * ppy;

        ctx.beginPath(); ctx.arc(pScreenX, pScreenY, pRadiusPx, 0, Math.PI * 2);
        ctx.fillStyle = player.color; ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = '#ffffff'; ctx.stroke();

        if (!kickedBall.active && gameState !== 'FIELD_GOAL_AIMING' && gameState !== 'PUNT_AIMING' && gameState !== 'PASS_IN_AIR') {
            ctx.beginPath(); ctx.ellipse(pScreenX + pRadiusPx*0.4, pScreenY - pRadiusPx*0.2, pRadiusPx*0.5, pRadiusPx*0.3, Math.PI/4, 0, Math.PI*2);
            ctx.fillStyle = '#8b4513'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
        }

        if (gameState === 'PASS_IN_AIR' && passObj.active) {
            const bScreenX = getScreenX(passObj.x); const bScreenY = getScreenY(passObj.y);
            const bRadiusPx = (player.radius * 0.6) * ppy * passObj.size; 
            ctx.beginPath(); ctx.ellipse(bScreenX, bScreenY, bRadiusPx, bRadiusPx*0.6, Math.PI/4, 0, Math.PI*2);
            ctx.fillStyle = '#8b4513'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
            ctx.beginPath(); ctx.moveTo(bScreenX - bRadiusPx*0.5, bScreenY); ctx.lineTo(bScreenX + bRadiusPx*0.5, bScreenY); ctx.stroke();
        }

        if ((gameState === 'FIELD_GOAL_KICKED' || gameState === 'PUNT_KICKED') && kickedBall.active) {
            const bScreenX = getScreenX(kickedBall.x); const bScreenY = getScreenY(kickedBall.y);
            const bRadiusPx = (player.radius * 0.6) * ppy * kickedBall.size; 
            ctx.beginPath(); ctx.ellipse(bScreenX, bScreenY, bRadiusPx, bRadiusPx*0.6, 0, 0, Math.PI*2);
            ctx.fillStyle = '#8b4513'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
            ctx.beginPath(); ctx.moveTo(bScreenX - bRadiusPx*0.5, bScreenY); ctx.lineTo(bScreenX + bRadiusPx*0.5, bScreenY); ctx.stroke();
        }

        if (gameState === 'FIELD_GOAL_AIMING' || gameState === 'PUNT_AIMING') {
            const meterWidth = ppy * 16; const meterHeight = ppy * 1.5;
            const meterX = getScreenX(FIELD_WIDTH_YARDS/2) - meterWidth/2; const meterY = getScreenY(player.y) - ppy * 5; 
            ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(meterX, meterY, meterWidth, meterHeight);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(meterX, meterY, meterWidth, meterHeight);
            const goodZoneW = meterWidth * 0.2; const goodZoneX = meterX + (meterWidth/2) - (goodZoneW/2);
            ctx.fillStyle = '#10b981'; ctx.fillRect(goodZoneX, meterY, goodZoneW, meterHeight);
            const cursorX = meterX + (kickingMeter.pos / 100) * meterWidth;
            ctx.fillStyle = '#fbbf24'; ctx.fillRect(cursorX - 2, meterY - 4, 4, meterHeight + 8);
        }

        for (let def of defenders) {
            const dScreenX = getScreenX(def.x); const dScreenY = getScreenY(def.y); const dRadiusPx = def.radius * ppy;
            ctx.beginPath(); ctx.arc(dScreenX, dScreenY, dRadiusPx, 0, Math.PI * 2);
            ctx.fillStyle = def.color; ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = '#000000'; ctx.stroke();
            ctx.beginPath(); ctx.moveTo(dScreenX - dRadiusPx*0.4, dScreenY - dRadiusPx*0.2); ctx.lineTo(dScreenX + dRadiusPx*0.4, dScreenY + dRadiusPx*0.2);
            ctx.moveTo(dScreenX + dRadiusPx*0.4, dScreenY - dRadiusPx*0.2); ctx.lineTo(dScreenX - dRadiusPx*0.4, dScreenY + dRadiusPx*0.2);
            ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
        }
    }

    function gameLoop(currentTime) {
        // Calculate Delta Time for the timer
        const dt = (currentTime - lastFrameTime) / 1000;
        lastFrameTime = currentTime;

        // Run the clock during gameplay
        if (gameState !== 'MENU' && gameState !== 'GAME_OVER') {
            gameTimeRemaining -= dt;
            if (gameTimeRemaining <= 0) {
                gameTimeRemaining = 0;
                timeExpired = true;
            }
            
            // Update Timer Text
            let minutes = Math.floor(gameTimeRemaining / 60);
            let seconds = Math.floor(gameTimeRemaining % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `${minutes}:${seconds}`;

            // If time is up, end the game (Wait until the current play/kick is over)
            if (timeExpired && (gameState === 'PRE_SNAP' || gameState === 'FIELD_GOAL_AIMING' || gameState === 'PUNT_AIMING')) {
                handleTimeExpired();
                return; // Stop updating the game loop for this frame
            }
        }

        update();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawField();
        drawEntities();
        requestAnimationFrame(gameLoop);
    }

    // Start loop with timestamp
    requestAnimationFrame((timestamp) => {
        lastFrameTime = timestamp;
        gameLoop(timestamp);
    });

</script>
